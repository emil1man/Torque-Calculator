<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title_lookups">Характеристики эпох — Sprocket</title>
    <meta name="description" content="Характеристики эпох для Sprocket — рекомендованные веса, удельная мощность, броня и вооружение по трем классам танков одновременно.">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v145/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">

    <link href="../../assets/css/shared.css" rel="stylesheet">

    <style>
        #infoCard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 900px) {
            #infoCard {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .tank-class-card {
            background-color: var(--md-sys-color-surface);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--md-elevation-1);
            transition: background-color 0.3s ease;
        }

        .card-header {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--md-sys-color-on-background);
        }

        .section-subtitle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 15px;
            margin-bottom: 8px;
            color: var(--md-sys-color-primary);
        }

            .section-subtitle .material-icons {
                font-size: 1.3rem;
            }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
        }

            .data-row:last-child {
                border-bottom: none;
            }

        .data-label {
            color: var(--md-sys-color-on-surface-variant);
        }

        .data-value {
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title" data-i18n="site_title_lookups">Характеристики эпох</h1>

            <div class="nav-container">
                <a href="/" class="btn btn--primary">
                    <span class="icon-chip material-icons" aria-hidden="true">home</span>
                    <span data-i18n="btn_home">Главная страница</span>
                </a>
                <a href="/data/lookups/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">analytics</span>
                    <span data-i18n="btn_lookups">Характеристики эпох</span>
                </a>
                <a href="/data/calculator/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">calculate</span>
                    <span data-i18n="btn_calculator">Калькулятор двигателя</span>
                </a>
                <a href="https://store.steampowered.com/app/1674170/Sprocket/" class="btn btn--steam" target="_blank" rel="noopener">
                    <span class="icon-chip"><span class="ico-steam" aria-hidden="true"></span></span>
                    <span data-i18n="btn_steam">Игра в Steam</span>
                </a>
                <a href="https://www.donationalerts.com/r/emil1man" class="btn btn--primary" target="_blank" rel="noopener">
                    <span class="icon-chip material-icons" aria-hidden="true">favorite</span>
                    <span data-i18n="btn_donate">Поддержать автора</span>
                </a>

                <div class="select-group lang-select-group">
                    <select id="langSelect" onchange="changeLanguage(this.value)"></select>
                </div>

                <button id="themeToggle" class="btn btn--tonal theme-btn-nav">
                    <span class="material-icons" id="themeIcon">dark_mode</span>
                </button>
            </div>
        </div>
    </header>
    <main class="page-container">

        <div class="filters-container">
            <div class="select-group">
                <label for="epochSelect" data-i18n="filter_epoch">Эпоха</label>
                <select id="epochSelect" onchange="updateView()"></select>
            </div>
        </div>

        <div id="infoCard" class="info-card" style="display: grid;"></div>

        <div class="note-box">
            <span class="material-icons">info</span>
            <span id="noteText" data-i18n="loading_note">Загрузка примечания...</span>
        </div>

    </main>

    <script>
        let jsonData = null;
        const tankClasses = ['light', 'medium', 'heavy'];

        const classLangKeys = {
            'light': 'class_light',
            'medium': 'class_medium',
            'heavy': 'class_heavy'
        };

        function createClassCardHTML(cls) {
            return `
                    <div class="tank-class-card" id="card-${cls}">
                        <div class="card-header" data-i18n="${classLangKeys[cls]}">-</div>

                        <div class="section-subtitle"><span class="material-icons">fitness_center</span> <span data-i18n="sec_weight_power">Вес и Мощность</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_weight">Рекомендуемый вес</span><span class="data-value" id="${cls}-weightVal">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_power">Удельная мощность</span><span class="data-value" id="${cls}-powerVal">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">shield</span> <span data-i18n="sec_hull">Бронирование корпуса (мм)</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_front">Лобовая</span><span class="data-value" id="${cls}-hullFront">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_side">Бортовая</span><span class="data-value" id="${cls}-hullSide">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_rear">Кормовая</span><span class="data-value" id="${cls}-hullRear">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">shield</span> <span data-i18n="sec_turret">Бронирование башни (мм)</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_turret_front">Лобовая</span><span class="data-value" id="${cls}-turretFront">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_turret_side">Бортовая</span><span class="data-value" id="${cls}-turretSide">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_turret_rear">Кормовая</span><span class="data-value" id="${cls}-turretRear">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">colorize</span> <span data-i18n="sec_weapons">Вооружение</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_caliber">Калибр</span><span class="data-value" id="${cls}-gunCaliber">-</span></div>
                        <div class="data-row"><span class="data-label" data-i18n="lbl_chamber">Длина каморы</span><span class="data-value" id="${cls}-gunChamber">-</span></div>
                    </div>
                `;
        }

        function buildEpochSelect() {
            if (!jsonData) return;
            const epochSelect = document.getElementById('epochSelect');
            if (!epochSelect) return;
            const savedValue = epochSelect.value;

            epochSelect.innerHTML = '';
            jsonData.epochs.forEach(epoch => {
                const opt = document.createElement('option');
                opt.value = epoch.id;

                const translationKey = epoch.label;

                // Если глобальный перевод от lang.js готов — берем его, иначе берем из localStorage, либо сам ключ
                let translatedText = undefined;
                if (typeof currentTranslations !== 'undefined' && currentTranslations[translationKey]) {
                    translatedText = currentTranslations[translationKey];
                }

                opt.textContent = translatedText || translationKey;
                epochSelect.appendChild(opt);
            });

            if (savedValue && Array.from(epochSelect.options).some(o => o.value === savedValue)) {
                epochSelect.value = savedValue;
            }

            updateView();
        }

        async function loadData() {
            try {
                const infoCardContainer = document.getElementById('infoCard');
                infoCardContainer.innerHTML = '';
                tankClasses.forEach(cls => {
                    infoCardContainer.innerHTML += createClassCardHTML(cls);
                });

                const response = await fetch('basedata.json');
                jsonData = await response.json();

                buildEpochSelect();

                if (typeof applyTranslations === 'function') { applyTranslations(); }

                if (jsonData.engine_note && !localStorage.getItem('site_lang')) {
                    document.getElementById('noteText').innerText = jsonData.engine_note;
                }

            } catch (e) {
                console.error("Ошибка загрузки:", e);
                document.getElementById('noteText').innerText = "Ошибка загрузки JSON-файла.";
            }
        }

        function updateView() {
            if (!jsonData) return;

            const epochSelect = document.getElementById('epochSelect');
            if (!epochSelect) return;

            const selectedEpochId = epochSelect.value;
            const epoch = jsonData.epochs.find(e => e.id === selectedEpochId) || jsonData.epochs[0];
            if (!epoch) return;

            const uT = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_t) || 'т';
            const uHp = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_hp) || 'л.с./т';
            const uMm = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_mm) || 'мм';
            const txtNone = (typeof currentTranslations !== 'undefined' && currentTranslations.no_turret) || 'Отсутствует';

            tankClasses.forEach(cls => {
                const wp = epoch.weight_power[cls];
                const armor = epoch.armor_mm[cls];
                const guns = epoch.guns_mm[cls];

                document.getElementById(`${cls}-weightVal`).innerText = `${wp.weight_t.min} - ${wp.weight_t.max} ${uT}`;
                document.getElementById(`${cls}-powerVal`).innerText = `${wp.power_hp_per_t.min} - ${wp.power_hp_per_t.max} ${uHp}`;

                document.getElementById(`${cls}-hullFront`).innerText = `${armor.hull.front} ${uMm}`;
                document.getElementById(`${cls}-hullSide`).innerText = `${armor.hull.side} ${uMm}`;
                document.getElementById(`${cls}-hullRear`).innerText = `${armor.hull.rear} ${uMm}`;

                if (armor.turret) {
                    document.getElementById(`${cls}-turretFront`).innerText = `${armor.turret.front} ${uMm}`;
                    document.getElementById(`${cls}-turretSide`).innerText = `${armor.turret.side} ${uMm}`;
                    document.getElementById(`${cls}-turretRear`).innerText = `${armor.turret.rear} ${uMm}`;
                } else {
                    const placeholderHTML = `<span style="color: var(--md-sys-color-on-surface-variant); font-style: italic; opacity: 0.7;">${txtNone}</span>`;
                    document.getElementById(`${cls}-turretFront`).innerHTML = placeholderHTML;
                    document.getElementById(`${cls}-turretSide`).innerHTML = placeholderHTML;
                    document.getElementById(`${cls}-turretRear`).innerHTML = placeholderHTML;
                }

                document.getElementById(`${cls}-gunCaliber`).innerText = `${guns.caliber.min} - ${guns.caliber.max} ${uMm}`;
                document.getElementById(`${cls}-gunChamber`).innerText = `${guns.chamber_length_mm.min} - ${guns.chamber_length_mm.max} ${uMm}`;
            });
        }

        // ==========================================
        // МАГИЯ АВТО-ПЕРЕВОДА (MutationObserver)
        // ==========================================
        // Следим за изменениями на странице. Когда lang.js переведет заголовки,
        // этот код мгновенно поймает момент и переведет наш список эпох.
        const observer = new MutationObserver(() => {
            if (typeof currentTranslations !== 'undefined' && currentTranslations["epoch_WW"]) {
                buildEpochSelect(); // Переводы появились — обновляем селект!
            }
        });

        // Запускаем слежку за текстовым боксом (он точно обновляется через lang.js)
        const targetNode = document.getElementById('noteText');
        if (targetNode) {
            observer.observe(targetNode, { childList: true, characterData: true, subtree: true });
        }

        window.buildEpochSelect = buildEpochSelect;
        loadData();
    </script>

    <script src="/assets/css/theme.js"></script>
    <script src="/assets/css/lang.js"></script>
</body>
</html>
