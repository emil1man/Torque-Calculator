<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор двигателя — Sprocket</title>
    <meta name="description" content="Калькулятор двигателя для Sprocket — подберите удельную мощность и массу танка, получите рекомендованный крутящий момент и объём.">

    <!-- Google Fonts async pattern -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v145/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">

    <link href="../../assets/css/shared.css" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Калькулятор двигателя</h1>

            <div class="nav-container">
                <a href="/" class="btn btn--primary">
                    <span class="icon-chip material-icons" aria-hidden="true">home</span>
                    Главная страница
                </a>
                <a href="/data/lookups/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">analytics</span>
                    Характеристики эпох
                </a>
                <a href="/data/calculator/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">calculate</span>
                    Калькулятор двигателя
                </a>
                <a href="https://store.steampowered.com/app/1674170/Sprocket/" class="btn btn--steam" target="_blank" rel="noopener">
                    <span class="icon-chip"><span class="ico-steam" aria-hidden="true"></span></span>
                    Игра в Steam
                </a>
                <a href="https://www.donationalerts.com/r/emil1man" class="btn btn--primary" target="_blank" rel="noopener">
                    <span class="icon-chip material-icons" aria-hidden="true">favorite</span>
                    Поддержать автора
                </a>
                <button id="themeToggle" class="btn btn--tonal">
                    <span class="material-icons" id="themeIcon">dark_mode</span>
                </button>
            </div>

        </div>
    </header>
    <main class="page-container">

        <div class="calculator-card">
            <div class="input-group">
                <label for="epochSelect">Эпоха</label>
                <select id="epochSelect" onchange="calculate()"></select>
            </div>

            <div class="input-group">
                <label for="inputHPT">Целевая удельная мощность (HP/t)</label>
                <input type="number" id="inputHPT" placeholder="Например: 15" step="0.1" min="1" oninput="calculate()">
                <span class="error-text" id="errorHPT">Введите корректное число</span>
            </div>

            <div class="input-group">
                <label for="inputMass">Текущая масса танка (тонн)</label>
                <input type="number" id="inputMass" placeholder="Например: 35.5" step="0.1" min="0.1" oninput="calculate()">
                <span class="error-text" id="errorMass">Масса должна быть больше нуля</span>
            </div>
        </div>

        <div class="results-card">
            <div class="result-row">
                <span class="result-label"><span class="material-icons">bolt</span> Рекомендуемое Torque:</span>
                <span class="result-value" id="outTorque">- Нм</span>
            </div>

            <div class="result-row">
                <span class="result-label"><span class="material-icons">opacity</span> Рекомендуемый литраж:</span>
                <span class="result-value" id="outDisplacement">- л</span>
            </div>

            <div class="result-row">
                <span class="result-label"><span class="material-icons">tune</span> Рекомендуемое n и V:</span>
                <div class="result-subvalues">
                    <div class="sub-box" id="outN" title="Количество цилиндров (n)">-</div>
                    <div class="sub-box" id="outV" title="Объем цилиндра (V)">- л</div>
                </div>
            </div>
        </div>

    </main>

    <script>
        let jsonData = null;

        const fallbackEpochsData = [
            { id: 'WW', label: 'WWI (Первая мировая)', maxCylinders: 6, deltaTorque: 46.00, hpPerTorque: 0.2, baseHp: 2.0 },
            { id: 'IW', label: 'Interwar (Межвоенный)', maxCylinders: 12, deltaTorque: 66.33, hpPerTorque: 0.4, baseHp: 5.0 },
            { id: 'EW', label: 'Earlywar (Ранняя ВМВ)', maxCylinders: 24, deltaTorque: 69.41, hpPerTorque: 0.467, baseHp: 7.33 },
            { id: 'MW', label: 'Midwar (Середина ВМВ)', maxCylinders: 24, deltaTorque: 72.91, hpPerTorque: 0.567, baseHp: 9.33 },
            { id: 'LW', label: 'Latewar (Конец ВМВ)', maxCylinders: 24, deltaTorque: 74.16, hpPerTorque: 0.667, baseHp: 9.33 }
        ];

        async function loadData() {
            try {
                const response = await fetch('data/lookup/index.json');
                jsonData = await response.json();

                const epochSelect = document.getElementById('epochSelect');
                epochSelect.innerHTML = '';
                jsonData.epochs.forEach(epoch => {
                    const opt = document.createElement('option');
                    opt.value = epoch.id;
                    opt.textContent = epoch.label;
                    epochSelect.appendChild(opt);
                });

                calculate();
            } catch (e) {
                console.log("Локальный JSON не найден, используем встроенную таблицу эпох");
                initFallbackEpochs();
            }
        }

        function initFallbackEpochs() {
            const epochSelect = document.getElementById('epochSelect');
            epochSelect.innerHTML = '';
            fallbackEpochsData.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.label;
                opt.dataset.maxCyl = f.maxCylinders;
                opt.dataset.deltaTorque = f.deltaTorque;
                opt.dataset.hpPerTorque = f.hpPerTorque;
                opt.dataset.baseHp = f.baseHp;
                epochSelect.appendChild(opt);
            });
            calculate();
        }

        function calculate() {
            const epochSelect = document.getElementById('epochSelect');
            const selectedEpochId = epochSelect.value;

            const hpt = parseFloat(document.getElementById('inputHPT').value);
            const mass = parseFloat(document.getElementById('inputMass').value);

            document.getElementById('errorHPT').style.display = 'none';
            document.getElementById('errorMass').style.display = 'none';

            let hasError = false;
            if (isNaN(hpt) || hpt <= 0) {
                if (document.getElementById('inputHPT').value !== "") { document.getElementById('errorHPT').style.display = 'block'; }
                hasError = true;
            }
            if (isNaN(mass) || mass <= 0) {
                if (document.getElementById('inputMass').value !== "") { document.getElementById('errorMass').style.display = 'block'; }
                hasError = true;
            }

            if (hasError) {
                clearResults();
                return;
            }

            let maxCylinders = 24;
            let deltaTorque = 74.16;
            let hpPerTorque = 0.667;
            let baseHp = 9.33;

            if (jsonData) {
                const epochData = jsonData.epochs.find(e => e.id === selectedEpochId);
                maxCylinders = epochData?.max_cylinders || 24;
                deltaTorque = epochData?.delta_torque || 74.16;
                hpPerTorque = epochData?.hp_per_torque || 0.667;
                baseHp = epochData?.base_hp || 9.33;
            } else {
                const selectedOption = epochSelect.options[epochSelect.selectedIndex];
                maxCylinders = parseInt(selectedOption?.dataset?.maxCyl) || 24;
                deltaTorque = parseFloat(selectedOption?.dataset?.deltaTorque) || 74.16;
                hpPerTorque = parseFloat(selectedOption?.dataset?.hpPerTorque) || 0.667;
                baseHp = parseFloat(selectedOption?.dataset?.baseHp) || 9.33;
            }

            const requiredHP = mass * hpt;
            let T_target = (requiredHP - baseHp) / hpPerTorque;

            if (T_target < 2 * 0.1 * deltaTorque) {
                T_target = 2 * 0.1 * deltaTorque;
            }

            let bestN = maxCylinders;
            let bestV = T_target / (bestN * deltaTorque);
            bestV = Math.ceil(bestV * 100) / 100;

            if (bestV < 0.1) {
                bestV = 0.1;
                for (let n = maxCylinders; n >= 2; n -= 2) {
                    let testTorque = Math.round((bestV * n * deltaTorque) / 10) * 10;
                    let testHP = hpPerTorque * testTorque + baseHp;

                    if (testHP >= requiredHP || n === 2) {
                        bestN = n;
                        break;
                    }
                }
            } else if (bestV > 5.0) {
                bestV = 5.0;
                bestN = maxCylinders;
            }

            let bestTorque = Math.round((bestV * bestN * deltaTorque) / 10) * 10;

            if (bestTorque === 0) {
                bestN = maxCylinders;
                bestV = 5.0;
                bestTorque = Math.round((bestV * bestN * deltaTorque) / 10) * 10;
            }

            const finalDisplacement = bestN * bestV;

            document.getElementById('outTorque').innerText = `${bestTorque} Нм`;
            document.getElementById('outDisplacement').innerText = `${finalDisplacement.toFixed(2)} л`;
            document.getElementById('outN').innerText = bestN;
            document.getElementById('outV').innerText = `${bestV.toFixed(2)} л`;
        }

        function clearResults() {
            document.getElementById('outTorque').innerText = "- Нм";
            document.getElementById('outDisplacement').innerText = "- л";
            document.getElementById('outN').innerText = "-";
            document.getElementById('outV').innerText = "- л";
        }

        window.onload = loadData;
    </script>

    <script src="/assets/css/theme.js"></script>
</body>
</html>
