<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="/Torque-Calculator/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title_calculator">Калькулятор двигателя — Sprocket</title>
    <meta name="description" content="Калькулятор двигателя для Sprocket — подберите удельную мощность и массу танка, получите рекомендованный крутящий момент и объём.">

    <script src="assets/js/init.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v145/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin>

    <noscript><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <link href="assets/css/shared.css" rel="stylesheet">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-container">

        <div class="calculator-card">
            <div class="input-group">
                <label for="epochSelect" data-i18n="filter_epoch">Эпоха</label>
                <select id="epochSelect" onchange="calculate()"></select>
            </div>

            <div class="input-group">
                <label for="inputHPT" data-i18n="label_target_hpt">Целевая удельная мощность (HP/t)</label>
                <input type="number" id="inputHPT" data-i18n-placeholder="ph_example_hpt" placeholder="Например: 15" step="0.1" min="1" oninput="debounceCalculate()">
                <span class="error-text" id="errorHPT" data-i18n="error_invalid_number">Введите корректное число</span>
            </div>

            <div class="input-group">
                <label for="inputMass" data-i18n="label_tank_mass">Текущая масса танка (тонн)</label>
                <input type="number" id="inputMass" data-i18n-placeholder="ph_example_mass" placeholder="Например: 35.5" step="0.1" min="0.1" oninput="debounceCalculate()">
                <span class="error-text" id="errorMass" data-i18n="error_mass_positive">Масса должна быть больше нуля</span>
            </div>
        </div>

        <div id="powerWarning" class="warning-banner warning-banner--power">
            <span class="material-icons warning-banner__icon">warning</span>
            <span id="warningText">Предупреждение</span>
        </div>

        <div class="results-card">
            <div class="result-row">
                <span class="result-label"><span class="material-icons">bolt</span> <span data-i18n="res_recommended_torque">Рекомендуемое Torque:</span></span>
                <span class="result-value" id="outTorque">- Nm</span>
            </div>

            <div class="result-row">
                <span class="result-label"><span class="material-icons">opacity</span> <span data-i18n="res_recommended_displacement">Рекомендуемый литраж:</span></span>
                <span class="result-value" id="outDisplacement">- L</span>
            </div>

            <div class="result-row">
                <span class="result-label"><span class="material-icons">tune</span> <span data-i18n="res_recommended_nv">Рекомендуемое n и V:</span></span>
                <div class="result-subvalues">
                    <div class="sub-box" id="outN" title="Количество цилиндров (n)">-</div>
                    <div class="sub-box" id="outV" title="Объем цилиндра (V)">- L</div>
                </div>
            </div>
        </div>

        <div class="button-container" style="justify-content:center; margin-top:16px;">
            <button id="topGearBtn"
                    class="btn btn--tonal"
                    data-i18n="openTopGear"
                    onclick="openTopGear()"
                    style="display:none;">
                Open Top Gear Calculator
            </button>
        </div>

    </main>

    <script>
        let jsonData = null;

        const fallbackEpochsData = [
            { id: 'WW', label: 'epoch_WW', min_cylinders: 2, max_cylinders: 6, delta_torque: 46.00, inertial_A: 1500, RPM_min: 900, rpm_max_limit: 3200, C_base: 7272, C_loss: 30 },
            { id: 'IW', label: 'epoch_IW', min_cylinders: 2, max_cylinders: 12, delta_torque: 66.3333, inertial_A: 2850, RPM_min: 1700, rpm_max_limit: 5900, C_base: 7430, C_loss: 10 },
            { id: 'EW', label: 'epoch_EW', min_cylinders: 2, max_cylinders: 24, delta_torque: 69.4167, inertial_A: 3600, RPM_min: 2100, rpm_max_limit: 7000, C_base: 7830, C_loss: 55 },
            { id: 'MW', label: 'epoch_MW', min_cylinders: 2, max_cylinders: 24, delta_torque: 72.9167, inertial_A: 4400, RPM_min: 2600, rpm_max_limit: 8600, C_base: 8000, C_loss: 36 },
            { id: 'LW', label: 'epoch_LW', min_cylinders: 2, max_cylinders: 24, delta_torque: 74.1667, inertial_A: 4800, RPM_min: 2800, rpm_max_limit: 9300, C_base: 8050, C_loss: 44 }
        ];

        function buildEpochSelect() {
            const epochSelect = document.getElementById('epochSelect');
            if (!epochSelect) return;
            const savedValue = epochSelect.value;

            epochSelect.innerHTML = '';
            
            const epochsToUse = jsonData ? jsonData.epochs : fallbackEpochsData;

            epochsToUse.forEach(epoch => {
                const opt = document.createElement('option');
                opt.value = epoch.id;

                const translationKey = epoch.label;
                let translatedText = undefined;
                
                if (typeof currentTranslations !== 'undefined' && currentTranslations[translationKey]) {
                    translatedText = currentTranslations[translationKey];
                }

                opt.textContent = translatedText || translationKey;

                // Если работаем со встроенной таблицей, вешаем датасеты
                if (!jsonData) {
                    opt.dataset.minCyl = epoch.min_cylinders;
                    opt.dataset.maxCyl = epoch.max_cylinders;
                    opt.dataset.deltaTorque = epoch.delta_torque;
                    opt.dataset.inertialA = epoch.inertial_A;
                    opt.dataset.rpmMin = epoch.RPM_min;
                    opt.dataset.rpmMaxLimit = epoch.rpm_max_limit;
                    opt.dataset.cBase = epoch.C_base;
                    opt.dataset.cLoss = epoch.C_loss;
                }

                epochSelect.appendChild(opt);
            });

            if (savedValue && Array.from(epochSelect.options).some(o => o.value === savedValue)) {
                epochSelect.value = savedValue;
            }
            
            calculate();
        }

        async function loadData() {
            try {
                const response = await fetch(new URL('dTorque.json', window.location.href));
                jsonData = await response.json();
                buildEpochSelect();
            } catch (e) {
                console.log("Локальный JSON не найден, используем встроенную таблицу эпох");
                jsonData = null;
                buildEpochSelect();
            }
            
            if (typeof applyTranslations === 'function') { applyTranslations(); }
        }

        function calculate() {
            const epochSelect = document.getElementById('epochSelect');
            if (!epochSelect || !epochSelect.value) return;

            const selectedEpochId = epochSelect.value;

            const hpt = parseFloat(document.getElementById('inputHPT').value);
            const mass = parseFloat(document.getElementById('inputMass').value);

            document.getElementById('errorHPT').style.display = 'none';
            document.getElementById('errorMass').style.display = 'none';

            let hasError = false;
            if (isNaN(hpt) || hpt <= 0) {
                if (document.getElementById('inputHPT').value !== "") { document.getElementById('errorHPT').style.display = 'block'; }
                hasError = true;
            }
            if (isNaN(mass) || mass <= 0) {
                if (document.getElementById('inputMass').value !== "") { document.getElementById('errorMass').style.display = 'block'; }
                hasError = true;
            }

            if (hasError) {
                clearResults();
                return;
            }

            let minCylinders, maxCylinders, deltaTorque, inertialA, rpmMin, rpmMaxLimit, cBase, cLoss;

            if (jsonData) {
                const epochData = jsonData.epochs.find(e => e.id === selectedEpochId);
                minCylinders = epochData?.min_cylinders || 2;
                maxCylinders = epochData?.max_cylinders || 24;
                deltaTorque = epochData?.delta_torque || 74.1667;
                inertialA = epochData?.inertial_A || 4800;
                rpmMin = epochData?.RPM_min || 2800;
                rpmMaxLimit = epochData?.rpm_max_limit || 9300;
                cBase = epochData?.C_base || 8050;
                cLoss = epochData?.C_loss || 44;
            } else {
                const selectedOption = epochSelect.options[epochSelect.selectedIndex];
                minCylinders = parseInt(selectedOption?.dataset?.minCyl) || 2;
                maxCylinders = parseInt(selectedOption?.dataset?.maxCyl) || 24;
                deltaTorque = parseFloat(selectedOption?.dataset?.deltaTorque) || 74.1667;
                inertialA = parseFloat(selectedOption?.dataset?.inertialA) || 4800;
                rpmMin = parseFloat(selectedOption?.dataset?.rpmMin) || 2800;
                rpmMaxLimit = parseFloat(selectedOption?.dataset?.rpmMaxLimit) || 9300;
                cBase = parseFloat(selectedOption?.dataset?.cBase) || 8050;
                cLoss = parseFloat(selectedOption?.dataset?.cLoss) || 44;
            }

            const requiredHP = mass * hpt;

            const maxTorquePossible = maxCylinders * 5.0 * deltaTorque;
            const maxComputedRPM = inertialA / Math.cbrt(5.0);
            let maxRPMPossible = Math.min(rpmMaxLimit, Math.max(rpmMin, maxComputedRPM));
            maxRPMPossible = Math.max(rpmMin, maxRPMPossible - 150);

            const maxPossibleHP = (maxTorquePossible * maxRPMPossible) / (cBase + (cLoss / 5.0));

            const warningBanner = document.getElementById('powerWarning');
            const warningText = document.getElementById('warningText');

            const tWarning = (typeof currentTranslations !== 'undefined' && currentTranslations.warn_prefix) || 'Внимание!';
            const tInEpoch = (typeof currentTranslations !== 'undefined' && currentTranslations.warn_in_epoch) || 'в эпоху';
            const tImpossible = (typeof currentTranslations !== 'undefined' && currentTranslations.warn_impossible) || 'невозможно достичь';
            const tForTank = (typeof currentTranslations !== 'undefined' && currentTranslations.warn_for_tank) || 'для танка весом';
            const tMaxMotor = (typeof currentTranslations !== 'undefined' && currentTranslations.warn_max_motor) || 'Максимальный мотор выдаст только';
            const uHpRaw = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_hp_short) || 'л.с.';

            if (requiredHP > maxPossibleHP) {
                const maxAchievableHPT = maxPossibleHP / mass;
                warningText.innerText = `${tWarning} ${tInEpoch} "${epochSelect.options[epochSelect.selectedIndex].text}" ${tImpossible} ${hpt} HP/t ${tForTank} ${mass} t. ${tMaxMotor} ${maxPossibleHP.toFixed(0)} ${uHpRaw} (~${maxAchievableHPT.toFixed(1)} HP/t).`;
                warningBanner.style.display = 'block';
            } else {
                warningBanner.style.display = 'none';
            }

            let bestN = maxCylinders;
            let bestV = 5.0;
            let minDisplacement = Infinity;
            let foundValidSolution = false;

            for (let n = minCylinders; n <= maxCylinders; n += 2) {
                for (let v = 0.1; v <= 5.0; v = Math.round((v + 0.01) * 100) / 100) {

                    const testTorque = n * v * deltaTorque;
                    const computedRPM = inertialA / Math.cbrt(v);
                    let testRPM = Math.min(rpmMaxLimit, Math.max(rpmMin, computedRPM));
                    testRPM = Math.max(rpmMin, testRPM - 150);

                    const testHP = (testTorque * testRPM) / (cBase + (cLoss / v));

                    if (testHP >= requiredHP) {
                        const currentDisplacement = n * v;

                        if (currentDisplacement < minDisplacement) {
                            minDisplacement = currentDisplacement;
                            bestN = n;
                            bestV = v;
                            foundValidSolution = true;
                        }
                        else if (Math.abs(currentDisplacement - minDisplacement) < 0.001 && n < bestN) {
                            bestN = n;
                            bestV = v;
                        }
                    }
                }
            }

            if (!foundValidSolution) {
                bestN = maxCylinders;
                bestV = 5.0;
            }

            const uNm = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_nm) || 'Нм';
            const uL = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_l) || 'л';

            const finalTorqueRaw = bestN * bestV * deltaTorque;
            const finalTorqueRounded = Math.round(finalTorqueRaw / 10) * 10;
            const finalDisplacement = bestN * bestV;

            document.getElementById('outTorque').innerText = `${finalTorqueRounded} ${uNm}`;
            document.getElementById('outDisplacement').innerText = `${finalDisplacement.toFixed(2)} ${uL}`;
            document.getElementById('outN').innerText = bestN;
            document.getElementById('outV').innerText = `${bestV.toFixed(2)} ${uL}`;
            document.getElementById('topGearBtn').style.display = 'inline-block';
        }

        function clearResults() {
            const uNm = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_nm) || 'Нм';
            const uL = (typeof currentTranslations !== 'undefined' && currentTranslations.unit_l) || 'л';

            const pW = document.getElementById('powerWarning');
            if (pW) pW.style.display = 'none';
            
            document.getElementById('outTorque').innerText = `- ${uNm}`;
            document.getElementById('outDisplacement').innerText = `- ${uL}`;
            document.getElementById('outN').innerText = "-";
            document.getElementById('outV').innerText = `- ${uL}`;
            const topGearBtn = document.getElementById('topGearBtn');
            if (topGearBtn) {
                topGearBtn.style.display = 'none';
            }
        }

        // Ждём сигнала, что переводы загружены/применены, затем строим селект эпох
        document.addEventListener('translationsLoaded', () => {
            buildEpochSelect();
        });

        window.buildEpochSelect = buildEpochSelect;

        // Запуск инициализации данных (безопаснее DOMContentLoaded вместо window.onload)
        document.addEventListener('DOMContentLoaded', loadData);
        let calcTimeout;
        function debounceCalculate() {
            clearTimeout(calcTimeout);
            calcTimeout = setTimeout(calculate, 150);
        }
        function openTopGear() {
            const mass = parseFloat(
                document.getElementById('inputMass').value
            );

            const epoch = document.getElementById('epochSelect').value;

            const n = parseInt(
                document.getElementById('outN').textContent
            );

            const vText = document
                .getElementById('outV')
                .textContent;

            const v = parseFloat(vText);

            const eraMap = {
                WW: 'WWI',
                IW: 'Interwar',
                EW: 'Earlywar',
                MW: 'Midwar',
                LW: 'Latewar'
            };

            const params = new URLSearchParams({
                era: eraMap[epoch],
                w: mass,
                v: v,
                c: n
            });

            window.open(
                `https://sprockettools.github.io/TopGearCalculator.html?${params}`,
                '_blank'
            );
        }

        window.openTopGear = openTopGear;
    </script>

    <script type="module" src="assets/js/header.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/lang.js"></script>
</body>
</html>
